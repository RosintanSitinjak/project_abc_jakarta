server {
    listen 8089 ssl ; 
    server_name lamsolusi.com;
    root /var/www/lamsolusi-compro-new/public;
    client_max_body_size 100M;
    server_tokens off;
   
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    

    index index.html index.php;

    charset utf-8;

    access_log /var/log/nginx/acces_crm.log;
    error_log  /var/log/nginx/error_crm.log;
    include secure/common.conf;

    ssl_certificate     /etc/letsencrypt/live/lamsolusi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lamsolusi.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
    

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

}
