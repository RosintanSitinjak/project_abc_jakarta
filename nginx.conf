server {
    listen 443 ssl;
    server_name lamsolusi.com;

    server_tokens off;
    charset utf-8;

    access_log /var/log/nginx/access_crm.log;
    error_log  /var/log/nginx/error_crm.log;

    include secure/common.conf;

    # Global proxy settings so it applies to ALL locations
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        proxy_pass http://127.0.0.1:3030;
        proxy_read_timeout 60s;
    }

    # static assets cache
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        proxy_pass http://127.0.0.1:3030;
    }

    ssl_certificate     /etc/letsencrypt/live/lamsolusi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lamsolusi.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}